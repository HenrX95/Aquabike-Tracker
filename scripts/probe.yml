name: RPE Probe

# Diagnose-Lauf. Findet heraus, unter welchem Feldnamen Garmin die
# Selbstbeurteilung ablegt. Aendert nichts — liest nur.
# Starten: Tab Actions → RPE Probe → Run workflow

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Garmin-Felder untersuchen
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/probe_rpe.py
