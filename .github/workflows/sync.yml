name: Aquabike Sync

on:
  schedule:
    # 21:15 UTC = 23:15 Sommerzeit München. Läuft am Ende des Tages.
    - cron: "15 21 * * *"
  workflow_dispatch:        # Manueller Trigger über den Actions-Tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Garmin + Oura abrufen
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
          PLAN_START: "2026-07-13"
        run: python scripts/sync.py

      - name: Dashboard-HTML bauen
        run: python scripts/build_dashboard.py

      - name: Änderungen committen
        run: |
          git config user.name "aquabike-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/dashboard.json docs/index.html
          git diff --staged --quiet || git commit -m "Sync $(date -u +%Y-%m-%d)"
          git push
